name: CI

on:
  push:
    branches: [ main, master, feat/* ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: lolc_operasional
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do mysqladmin ping -h127.0.0.1 -uroot -proot >/dev/null 2>&1 && break || sleep 2; done

      - name: Run Django migrations & tests
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: root
          MYSQL_PASSWORD: root
          MYSQL_NAME: lolc_operasional
          DJANGO_DEBUG: false
          DJANGO_SECRET_KEY: ci-secret
          DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost
          CORS_ALLOWED_ORIGINS: http://localhost:3000
        run: |
          python project/manage.py migrate --noinput
          python -W error::DeprecationWarning project/manage.py test

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build --if-present
